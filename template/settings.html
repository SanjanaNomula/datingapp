{% extends 'base.html' %}
{% load static %}

{% block title %}Settings | KnotSpot{% endblock %}

{% block head %}
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "surface-variant": "#e0e3e5",
                  "error-container": "#ffdad6",
                  "tertiary": "#006242",
                  "on-tertiary-fixed-variant": "#005236",
                  "on-tertiary-fixed": "#002113",
                  "tertiary-fixed-dim": "#4edea3",
                  "secondary-container": "#d5e4f8",
                  "primary-fixed-dim": "#b4c5ff",
                  "primary-container": "#2563eb",
                  "surface-container-low": "#f2f4f6",
                  "on-secondary-fixed": "#0e1d2b",
                  "primary-fixed": "#dbe1ff",
                  "secondary-fixed-dim": "#b9c8db",
                  "surface-container-highest": "#e0e3e5",
                  "on-surface-variant": "#434655",
                  "on-surface": "#191c1e",
                  "inverse-primary": "#b4c5ff",
                  "outline-variant": "#c3c6d7",
                  "on-tertiary-container": "#bdffdb",
                  "surface-container-high": "#e6e8ea",
                  "secondary": "#516070",
                  "surface-dim": "#d8dadc",
                  "secondary-fixed": "#d5e4f8",
                  "outline": "#737686",
                  "surface-bright": "#f7f9fb",
                  "surface": "#f7f9fb",
                  "inverse-surface": "#2d3133",
                  "surface-container": "#eceef0",
                  "on-primary-fixed": "#00174b",
                  "error": "#ba1a1a",
                  "on-primary": "#ffffff",
                  "tertiary-fixed": "#6ffbbe",
                  "on-tertiary": "#ffffff",
                  "on-secondary-fixed-variant": "#3a4858",
                  "on-primary-container": "#eeefff",
                  "on-secondary-container": "#576676",
                  "on-secondary": "#ffffff",
                  "on-error": "#ffffff",
                  "background": "#f7f9fb",
                  "primary": "#004ac6",
                  "on-error-container": "#93000a",
                  "surface-tint": "#0053db",
                  "on-background": "#191c1e",
                  "surface-container-lowest": "#ffffff",
                  "on-primary-fixed-variant": "#003ea8",
                  "tertiary-container": "#007d55",
                  "inverse-on-surface": "#eff1f3"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "1.5rem",
                  "xl": "2rem",
                  "full": "9999px"
          },
          "spacing": {
                  "card-padding": "16px",
                  "section-gap": "20px",
                  "stack-gap": "14px",
                  "gutter": "12px",
                  "container-margin": "16px"
          },
          "fontFamily": {
                  "label-bold": ["Plus Jakarta Sans"],
                  "headline-lg": ["Plus Jakarta Sans"],
                  "headline-lg-mobile": ["Plus Jakarta Sans"],
                  "title-md": ["Plus Jakarta Sans"],
                  "body-sm": ["Plus Jakarta Sans"],
                  "display-lg": ["Plus Jakarta Sans"],
                  "body-lg": ["Plus Jakarta Sans"]
          },
          "fontSize": {
                  "label-bold": ["11px", {"lineHeight": "14px", "fontWeight": "700"}],
                  "headline-lg": ["26px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                  "headline-lg-mobile": ["20px", {"lineHeight": "26px", "fontWeight": "700"}],
                  "title-md": ["15px", {"lineHeight": "20px", "fontWeight": "600"}],
                  "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                  "display-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                  "body-lg": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
          }
        },
      },

  </script>
<style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .shadow-card {
      box-shadow: 0 4px 30px rgba(37, 99, 235, 0.04);
    }

    html, body {
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
        background: #f7f9fb;
        padding: 0 !important;
        margin: 0 !important;
    }

    .container {
        max-width: 100% !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
        height: 100%;
        box-sizing: border-box;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
    }

    .settings-wrapper {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100%;
        max-width: 560px;
        margin: 0 auto;
        background: linear-gradient(180deg, #fbfcff 0%, #f7f9fb 58%, #eff4fb 100%);
        z-index: 10;
    }

    .settings-header {
        flex-shrink: 0;
        padding: calc(10px + env(safe-area-inset-top)) 20px 16px;
        background: rgba(247, 249, 251, 0.78);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid rgba(0, 74, 198, 0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        z-index: 20;
    }

    .settings-header-main {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
    }

    .settings-header h2 {
        margin: 0;
        font-size: 28px;
        color: #151b27;
        font-weight: 800;
        letter-spacing: -0.04em;
    }

    .match-back-btn {
        width: 44px;
        height: 44px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.88);
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        color: var(--primary);
        border: 1px solid rgba(0, 74, 198, 0.08);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
        transition: 0.2s ease;
        flex-shrink: 0;
        cursor: pointer;
    }

    .match-back-btn .material-symbols-outlined {
        font-size: 22px;
    }

    .match-back-btn:active {
        transform: scale(0.94);
    }

    .settings-body {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 20px 20px 110px;
        background: transparent;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }
    .settings-body::-webkit-scrollbar {
        display: none;
    }
</style>
{% endblock %}

{% block body %}
<div class="settings-wrapper text-on-surface">
    <!-- Header -->
    <div class="settings-header">
        <div class="settings-header-main">
            <button onclick="window.history.back()" class="match-back-btn">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h2>Settings</h2>
        </div>
        <div class="flex items-center gap-1">
            <button class="p-1.5 rounded-full hover:bg-surface-container-high/50 active:scale-95 transition-all text-on-surface-variant border-0 bg-none cursor-pointer">
                <span class="material-symbols-outlined" style="font-size:24px;">help_outline</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="settings-body">
        <div class="space-y-3">


<!-- Settings List -->
<div class="space-y-3">

<!-- Push Notifications -->
<div class="bg-surface-container-lowest rounded-[20px] p-4 shadow-card border border-outline-variant/10">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-[14px] bg-tertiary-fixed-dim/20 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" style="font-size:20px; font-variation-settings:'FILL' 1;">notifications</span>
</div>
<div>
<h3 class="font-title-md text-title-md" style="font-size:15px;font-weight:600;">Push Notifications</h3>
<p id="notif-status" class="font-body-sm text-body-sm text-tertiary font-semibold" style="font-size:13px;">Checking...</p>
</div>
</div>
<button onclick="forceAskPushPermission()" class="bg-primary text-white px-4 py-1.5 rounded-full font-label-bold text-label-bold active:scale-95 border-0 cursor-pointer" style="font-size:11px;">Request</button>
</div>
</div>

<!-- Install App -->
<button onclick="triggerPwaInstall()" class="w-full bg-surface-container-lowest rounded-[20px] p-4 shadow-card border border-outline-variant/10 hover:bg-surface-container-low transition-colors text-left border-0 cursor-pointer">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-[14px] bg-secondary-container/40 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size:20px;">download</span>
</div>
<div>
<h3 class="font-title-md text-title-md" style="font-size:15px;font-weight:600;color:var(--text-main);">Install App</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant" style="font-size:13px;">Add KnotSpot to home screen</p>
</div>
</div>
<span class="material-symbols-outlined text-outline" style="font-size:18px;">chevron_right</span>
</div>
</button>

<!-- Logout -->
<button onclick="handleLogout()" class="w-full bg-surface-container-lowest rounded-[20px] p-4 shadow-card border border-outline-variant/10 hover:bg-surface-container-low transition-colors text-left border-0 cursor-pointer">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-[14px] bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size:20px;">logout</span>
</div>
<div>
<h3 class="font-title-md text-title-md" style="font-size:15px;font-weight:600;color:var(--text-main);">Logout</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant" style="font-size:13px;">Sign out of your account</p>
</div>
</div>
<span class="material-symbols-outlined text-outline" style="font-size:18px;">chevron_right</span>
</div>
</button>

</div><!-- /settings-list -->

<!-- Delete Account -->
<div class="pt-6">
<button onclick="handleDeleteAccount()" class="w-full bg-error-container/20 rounded-[20px] p-4 shadow-card border border-error/10 hover:bg-error-container/30 transition-colors text-left border-0 cursor-pointer">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-[14px] bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-error" style="font-size:20px; font-variation-settings:'FILL' 1;">delete</span>
</div>
<div>
<h3 class="font-title-md text-title-md" style="font-size:15px;font-weight:700;color:#dc2626;">Delete Account</h3>
<p class="font-body-sm text-body-sm" style="font-size:13px;color:#ef4444;">Permanently remove your data</p>
</div>
</div>
<span class="material-symbols-outlined text-error" style="font-size:18px;">chevron_right</span>
</div>
</button>
</div>

<!-- App Version -->
<div class="text-center pt-6 pb-8">
<p class="font-label-bold text-label-bold text-on-surface-variant/40 uppercase tracking-widest" style="font-size:11px;">CampusPulse v2.4.0</p>
</div>
        </div>
    </div>
</div>

<!-- Hidden form for logout -->
<form id="logout-form" method="POST" action="{% url 'logout' %}" style="display:none;">{% csrf_token %}</form>
<!-- Hidden form for delete account -->
<form id="delete-account-form" method="POST" action="{% url 'delete_account' %}" style="display:none;">{% csrf_token %}</form>

<script>
async function handleLogout() {
  const c = await customConfirm("Are you sure you want to logout?", "Logout", "Logout", "Stay");
  if (c) document.getElementById('logout-form').submit();
}
async function handleDeleteAccount() {
  const c = await customConfirm(
    "This action CANNOT be undone. All your matches, chats, and confessions will be lost forever.",
    "Delete Account?", "Permanently Delete", "Keep Account"
  );
  if (c) document.getElementById('delete-account-form').submit();
}
function forceAskPushPermission() {
  if (window.showCustomNotificationPrompt) {
    window.showCustomNotificationPrompt(true);
  } else {
    customAlert("Push notification system is loading. Please try again in a moment.", "System Loading");
  }
}
function updateNotifStatus() {
  const el = document.getElementById('notif-status');
  if (!el) return;
  if ('Notification' in window) {
    if (Notification.permission === 'granted') { el.innerText = 'Enabled'; el.style.color = '#22c55e'; }
    else if (Notification.permission === 'denied') { el.innerText = 'Blocked in settings'; el.style.color = '#ef4444'; }
    else { el.innerText = 'Not yet granted'; el.style.color = '#64748b'; }
  } else {
    el.innerText = 'Not supported'; el.style.color = '#ef4444';
  }
}
document.addEventListener('DOMContentLoaded', function() {
  updateNotifStatus();
  window.addEventListener('notificationPermissionChanged', updateNotifStatus);
});
</script>
{% endblock %}
